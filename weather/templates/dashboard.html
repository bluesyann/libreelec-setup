<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Météo Carrels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { margin: 10px; }
        .card-title { font-size: 1.2rem; }
        .card-value { font-size: 2rem; font-weight: bold; }
        @media (max-width: 768px) {
            .card { margin: 5px; }
            .card-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="text-center my-4">Météo Carrels</h1>
        {% if db_error %}
        <div class="alert alert-warning" role="alert">
            {{ db_error }}
        </div>
        {% endif %}
        <form method="post" class="row mb-4">
            <div class="col-md-4 offset-md-4">
                <div class="input-group">
                    <select name="days" class="form-select">
                        <option value="1" {% if days == 1 %}selected{% endif %}>24 heures</option>
                        <option value="3" {% if days == 3 %}selected{% endif %}>3 jours</option>
                        <option value="7" {% if days == 7 %}selected{% endif %}>7 jours</option>
                        <option value="30" {% if days == 30 %}selected{% endif %}>30 jours</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Recharger</button>
                </div>
            </div>
        </form>
        <div class="row mb-3">
            <div class="col-md-4 offset-md-4 text-center">
                <button id="reboot-btn" type="button" class="btn btn-danger w-100" style="font-size: 1.1rem; font-weight: 700;">
                    Reboot system
                </button>
                <div id="reboot-status" class="small mt-2"></div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title">Température</h5>
                        <p class="card-value">{{ temp }} °C</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title">Humidité</h5>
                        <p class="card-value">{{ hum }} %</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-info">
                    <div class="card-body">
                        <h5 class="card-title">Pression</h5>
                        <p class="card-value">{{ press }} hPa</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="row my-4">
            <div class="col-12">
                {{ plot|safe }}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const rebootBtn = document.getElementById('reboot-btn');
        const rebootStatus = document.getElementById('reboot-status');

        rebootBtn.addEventListener('click', async () => {
            if (!confirm('Reboot system?')) {
                return;
            }

            rebootBtn.disabled = true;
            rebootStatus.textContent = 'Demande en cours...';

            try {
                const response = await fetch('/reboot', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                rebootStatus.textContent = data.message || 'Commande envoyee.';
            } catch (error) {
                rebootStatus.textContent = 'Echec de la demande de redemarrage.';
            } finally {
                setTimeout(() => {
                    rebootBtn.disabled = false;
                }, 5000);
            }
        });
    </script>
</body>
</html>
